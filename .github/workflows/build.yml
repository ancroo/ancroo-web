name: Build Extension

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high || true

      - name: Lint
        run: pnpm lint

      - name: Build extension
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ancroo-web-extension
          path: dist/
          retention-days: 30

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ancroo-web-extension
          path: ancroo-web-extension

      - name: Create release archive
        run: zip -9 -r ancroo-web-extension.zip ancroo-web-extension

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ancroo-web-extension.zip
          generate_release_notes: true
          body: |
            ## Download

            | File | Description |
            |------|-------------|
            | `ancroo-web-extension.zip` | Chrome/Edge extension (Manifest V3) |

            ## Installation

            1. Download `ancroo-web-extension.zip`
            2. Extract to a folder
            3. Open Chrome → `chrome://extensions/`
            4. Enable **Developer mode** (top right)
            5. Click **Load unpacked** → select the extracted folder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
